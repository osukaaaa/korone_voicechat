<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #4ade80;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --danger: #f87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  /* ── LOGO ── */
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    box-shadow: 0 0 30px rgba(124,106,247,0.3);
  }
  .logo-icon svg { width: 26px; height: 26px; fill: white; }
  .logo h1 {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .logo p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--text);
  }

  /* ── INPUT ── */
  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .input-group input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }
  .input-group input::placeholder { color: var(--muted); font-size: 13px; }

  /* ── BUTTON ── */
  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: white;
    box-shadow: 0 4px 20px rgba(124,106,247,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,106,247,0.4); }
  .btn-primary:active { transform: translateY(0); }
  .btn-danger {
    background: rgba(248,113,113,0.12);
    color: var(--danger);
    border: 1px solid rgba(248,113,113,0.2);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 18px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── ROOM VIEW ── */
  #room-view { display: none; }

  .code-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 18px;
    text-align: center;
  }
  .code-display .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .code-chars {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .code-char {
    width: 36px;
    height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }

  /* ── USERS LIST ── */
  .users-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .users-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; min-height: 40px; }
  .user-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    animation: fadeUp 0.3s ease forwards;
  }
  .user-avatar {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .user-name { font-size: 13px; font-weight: 500; flex: 1; }
  .user-mic {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  .user-mic.speaking { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  /* ── MIC INDICATOR ── */
  .mic-status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .mic-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .mic-dot.active { background: var(--accent2); box-shadow: 0 0 10px var(--accent2); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  .mic-label { font-size: 13px; color: var(--muted); }
  .mic-label span { color: var(--text); font-weight: 500; }

  /* ── STATUS ── */
  .status-msg {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 14px;
    min-height: 18px;
  }
  .status-msg.error { color: var(--danger); }
  .status-msg.success { color: var(--accent2); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { background: var(--surface); color: var(--text); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zm-4 8a1 1 0 0 0-2 0 7 7 0 0 0 6 6.93V21H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.07A7 7 0 0 0 19 12a1 1 0 0 0-2 0 5 5 0 0 1-10 0z"/></svg>
    </div>
    <h1>VOICE CHAT</h1>
    <p>Roblox Revival</p>
  </div>

  <!-- JOIN/CREATE VIEW -->
  <div class="card" id="join-view">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('join')">Join Room</button>
      <button class="tab" onclick="switchTab('create')">Create Room</button>
    </div>

    <div class="tab-content active" id="tab-join">
      <div class="input-group">
        <label>Room Code</label>
        <input type="text" id="join-code" placeholder="e.g. X7K2AB" maxlength="6" autocomplete="off" spellcheck="false">
      </div>
      <div class="input-group">
        <label>Your Username</label>
        <input type="text" id="join-name" placeholder="Enter username" maxlength="20">
      </div>
      <button class="btn btn-primary" onclick="joinRoom()">Join Voice Chat</button>
    </div>

    <div class="tab-content" id="tab-create">
      <div class="input-group">
        <label>Your Username</label>
        <input type="text" id="create-name" placeholder="Enter username" maxlength="20">
      </div>
      <button class="btn btn-primary" onclick="createRoom()">Create Room</button>
    </div>

    <div class="status-msg" id="join-status"></div>
  </div>

  <!-- ROOM VIEW -->
  <div class="card" id="room-view">
    <div class="code-display">
      <div class="label">Room Code — share with others</div>
      <div class="code-chars" id="code-chars"></div>
    </div>

    <div class="mic-status">
      <div class="mic-dot" id="mic-dot"></div>
      <div class="mic-label">Mic: <span id="mic-label-text">Listening...</span></div>
    </div>

    <div class="users-title">In this room</div>
    <div class="users-list" id="users-list"></div>

    <button class="btn btn-danger" onclick="leaveRoom()">Leave Voice Chat</button>
    <div class="status-msg" id="room-status"></div>
  </div>
</div>

<script>
// ── WebRTC Voice Chat ────────────────────────────────────────────────────────

const SIGNALING_URL = 'koronevoicechat-production.up.railway.app'; // <-- change this

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

let ws = null;
let localStream = null;
let peers = {}; // peerId -> RTCPeerConnection
let myId = null;
let myName = '';
let currentRoom = '';
let audioCtx = null;
let analyser = null;
let speakingInterval = null;
let userElements = {};

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'join' && i === 0) || (tab === 'create' && i === 1));
  });
  document.querySelectorAll('.tab-content').forEach((c, i) => {
    c.classList.toggle('active', (tab === 'join' && i === 0) || (tab === 'create' && i === 1));
  });
}

// ── ROOM CODE DISPLAY ─────────────────────────────────────────────────────────
function showCode(code) {
  const container = document.getElementById('code-chars');
  container.innerHTML = '';
  for (const ch of code) {
    const el = document.createElement('div');
    el.className = 'code-char';
    el.textContent = ch;
    container.appendChild(el);
  }
}

// ── GENERATE RANDOM CODE ──────────────────────────────────────────────────────
function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ── GET MIC ───────────────────────────────────────────────────────────────────
async function getMic() {
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

  // Set up voice activity detection
  audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(localStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  source.connect(analyser);

  speakingInterval = setInterval(checkSpeaking, 100);
}

function checkSpeaking() {
  if (!analyser) return;
  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += Math.abs(data[i] - 128);
  const avg = sum / data.length;
  const speaking = avg > 5;

  document.getElementById('mic-dot').classList.toggle('active', speaking);
  document.getElementById('mic-label-text').textContent = speaking ? 'Speaking' : 'Listening...';

  // Tell signaling server about speaking state
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'speaking', speaking, room: currentRoom, from: myId, name: myName }));
  }
}

// ── SIGNALING ─────────────────────────────────────────────────────────────────
function connectSignaling(room, name, onReady) {
  ws = new WebSocket(SIGNALING_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', room, name }));
  };

  ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'welcome') {
      myId = msg.id;
      onReady(msg.peers || []);
    }

    else if (msg.type === 'peer-joined') {
      addUserToList(msg.id, msg.name);
      await startCall(msg.id, msg.name, true);
    }

    else if (msg.type === 'peer-left') {
      removeUser(msg.id);
    }

    else if (msg.type === 'offer') {
      await handleOffer(msg.from, msg.name, msg.offer);
    }

    else if (msg.type === 'answer') {
      if (peers[msg.from]) await peers[msg.from].setRemoteDescription(msg.answer);
    }

    else if (msg.type === 'ice') {
      if (peers[msg.from]) await peers[msg.from].addIceCandidate(msg.candidate);
    }

    else if (msg.type === 'speaking') {
      const dot = document.querySelector(`#user-${msg.from} .user-mic`);
      if (dot) dot.classList.toggle('speaking', msg.speaking);
    }
  };

  ws.onclose = () => {
    setRoomStatus('Disconnected from server.', 'error');
  };
}

// ── WEBRTC ────────────────────────────────────────────────────────────────────
async function startCall(peerId, peerName, isInitiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers[peerId] = pc;

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (e) => {
    const audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    audio.play().catch(() => {});
  };

  pc.onicecandidate = (e) => {
    if (e.candidate && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ice', to: peerId, candidate: e.candidate, room: currentRoom, from: myId }));
    }
  };

  if (isInitiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'offer', to: peerId, offer, room: currentRoom, from: myId, name: myName }));
  }
}

async function handleOffer(peerId, peerName, offer) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers[peerId] = pc;

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (e) => {
    const audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    audio.play().catch(() => {});
  };

  pc.onicecandidate = (e) => {
    if (e.candidate && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ice', to: peerId, candidate: e.candidate, room: currentRoom, from: myId }));
    }
  };

  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', to: peerId, answer, room: currentRoom, from: myId }));
}

// ── USER LIST ─────────────────────────────────────────────────────────────────
function addUserToList(id, name) {
  const list = document.getElementById('users-list');
  const el = document.createElement('div');
  el.className = 'user-item';
  el.id = `user-${id}`;
  el.innerHTML = `
    <div class="user-avatar">${name.charAt(0).toUpperCase()}</div>
    <div class="user-name">${name}</div>
    <div class="user-mic"></div>
  `;
  list.appendChild(el);
  userElements[id] = el;
}

function removeUser(id) {
  if (userElements[id]) { userElements[id].remove(); delete userElements[id]; }
  if (peers[id]) { peers[id].close(); delete peers[id]; }
}

// ── JOIN ROOM ─────────────────────────────────────────────────────────────────
async function joinRoom() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('join-name').value.trim();
  if (!code || code.length !== 6) return setJoinStatus('Enter a valid 6-character code.', 'error');
  if (!name) return setJoinStatus('Enter your username.', 'error');

  setJoinStatus('Requesting microphone...');
  try { await getMic(); } catch { return setJoinStatus('Microphone access denied.', 'error'); }

  myName = name;
  currentRoom = code;
  setJoinStatus('Connecting...');

  connectSignaling(code, name, (existingPeers) => {
    showRoomView(code);
    addUserToList(myId, name + ' (you)');
    existingPeers.forEach(p => {
      addUserToList(p.id, p.name);
      startCall(p.id, p.name, true);
    });
  });
}

// ── CREATE ROOM ───────────────────────────────────────────────────────────────
async function createRoom() {
  const name = document.getElementById('create-name').value.trim();
  if (!name) return setJoinStatus('Enter your username.', 'error');

  setJoinStatus('Requesting microphone...');
  try { await getMic(); } catch { return setJoinStatus('Microphone access denied.', 'error'); }

  const code = generateCode();
  myName = name;
  currentRoom = code;
  setJoinStatus('Starting room...');

  connectSignaling(code, name, () => {
    showRoomView(code);
    addUserToList(myId, name + ' (you)');
  });
}

// ── LEAVE ROOM ────────────────────────────────────────────────────────────────
function leaveRoom() {
  if (ws) ws.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  clearInterval(speakingInterval);
  Object.values(peers).forEach(p => p.close());
  peers = {}; userElements = {};
  document.getElementById('users-list').innerHTML = '';
  document.getElementById('room-view').style.display = 'none';
  document.getElementById('join-view').style.display = 'block';
  setJoinStatus('');
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function showRoomView(code) {
  document.getElementById('join-view').style.display = 'none';
  document.getElementById('room-view').style.display = 'block';
  showCode(code);
}

function setJoinStatus(msg, type) {
  const el = document.getElementById('join-status');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ` ${type}` : '');
}

function setRoomStatus(msg, type) {
  const el = document.getElementById('room-status');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ` ${type}` : '');
}

// Auto-uppercase code input
document.getElementById('join-code').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});
</script>
</body>
</html>
